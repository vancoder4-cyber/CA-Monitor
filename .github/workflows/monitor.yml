name: CA Monitor

# 定时(cron 用 UTC)。美股常规时段 9:30–16:00 ET,每个交易日扫 3 次:
#   开盘后 9:35 ET、盘中正中 12:45 ET、收盘后 16:05 ET。
# 下面按夏令时 EDT(UTC-4)换算;冬令时 EST(UTC-5)各 +1 小时(把 13/16/20 改成 14/17/21)。
on:
  schedule:
    - cron: "35 13 * * 1-5"   # 09:35 ET 开盘后
    - cron: "45 16 * * 1-5"   # 12:45 ET 盘中(时段正中)
    - cron: "5 20 * * 1-5"    # 16:05 ET 收盘后
  workflow_dispatch: {}        # 允许手动触发

permissions:
  contents: read    # 只读;state 用缓存持久化,不再提交到仓库(避免和你手动推送抢分支)
  pages: write      # 部署 Pages
  id-token: write

concurrency:
  group: ca-monitor
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt

      # 跨运行持久化预警去重状态(用缓存,不提交到仓库)
      - name: 恢复 state 缓存
        uses: actions/cache@v4
        with:
          path: |
            data/state.json
            data/cik_map.json
          key: ca-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ca-state-

      - name: 抓取 + 核对 + 生成面板 + 推 Lark
        env:
          ALPHAVANTAGE: ${{ secrets.ALPHAVANTAGE }}
          FMP: ${{ secrets.FMP }}
          FINNHUB: ${{ secrets.FINNHUB }}
          TIINGO: ${{ secrets.TIINGO }}
          ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          SEC_UA: ${{ secrets.SEC_UA }}
          LARK_WEBHOOK: ${{ secrets.LARK_WEBHOOK }}
          LARK_SECRET: ${{ secrets.LARK_SECRET }}
          LARK_DASHBOARD_URL: ${{ vars.LARK_DASHBOARD_URL }}
        run: python run.py

      - name: 准备 Pages 站点
        run: |
          mkdir -p public
          cp dashboard.html public/index.html
          cp site_data.json public/data.json || echo "no site_data.json"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
